<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Scoped CSS Variables and JS</title>
  <link rel="icon" href="https://fav.farm/✅" />
</head>

<body>
  <h2>Update CSS Variables with <span class='hl'>JS</span></h2>
  <button class="reset">Reset to Default</button>

  <div class="controls">
    <label for="spacing">Spacing:</label>
    <input id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">

    <label for="blur">Blur:</label>
    <input id="blur" type="range" name="blur" min="0" max="25" value="10" data-sizing="px">

    <label for="base">Base Color</label>
    <input id="base" type="color" name="base" value="#ffc600">

    <label for="grayscale">Grayscale:</label>
    <input id="grayscale" type="range" name="grayscale" min="0" max="100" value="0" data-sizing="%">
  </div>

  <img src="https://i.ibb.co/W4D1p7RN/nature-wallpaper.jpg">

  <style>
    :root {
      --base: #ffc600;
      --spacing: 10px;
      --blur: 10px;
      --grayscale: 0%;
    }

    img {
      padding: var(--spacing);
      background: var(--base);
      filter: blur(var(--blur)) grayscale(var(--grayscale));
      margin-top: 5px;
    }

    h2 {
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .hl {
      color: var(--base);
    }

    /*
      misc styles, nothing to do with CSS variables
    */

    body {
      text-align: center;
      background: url("https://i.ibb.co/7x78sGM7/360-F-509854035-W21r-Tw-Rs-VVAg-Nq9dj-Rvaqi-USci-X1px8-K.jpg");
      background-size: cover;
      background-attachment: fixed;
      color: white;
      font-family: 'helvetica neue', sans-serif;
      font-weight: 100;
      font-size: 40px;
    }

    .controls {
      margin-bottom: 30px;
    }

    input {
      width: 100px;
    }

    .reset {
      border: 2px solid var(--base);
      background-color: blue;
      color: white;
      padding: 10px 20px;
      font-size: 20px;
      cursor: pointer;
      margin-bottom: 30px;
      border-radius: 5px;
    }
  </style>

  <script>
    const inputs = document.querySelectorAll('.controls input');  // it gives nodelist not an array

    function handleUpdate() {
      const suffix = this.dataset.sizing || '';
      document.documentElement.style.setProperty(`--${this.name}`, this.value + suffix);
    }

    inputs.forEach(input => input.addEventListener('change', handleUpdate));
    inputs.forEach(input => input.addEventListener('mousemove', handleUpdate));

    const resetBtn = document.querySelector('.reset');

    resetBtn.addEventListener('click', () => {
      //Reset CSS Variables
      document.documentElement.style.setProperty('--spacing', '10px');
      document.documentElement.style.setProperty('--blur', '10px');
      document.documentElement.style.setProperty('--base', '#ffc600');
      document.documentElement.style.setProperty('--grayscale', '0%');
      //Reset HTML sliders
      document.querySelector('#spacing').value = 10;
      document.querySelector('#blur').value = 10;
      document.querySelector('#base').value = '#ffc600';
      document.querySelector('#grayscale').value = 0;
    });
  </script>


</body>

</html>
