<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HTML Video Player</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="https://fav.farm/🔥" />
</head>

<body>
  <h1 class="main-title">Custom Video Player</h1>
  <div class="player">
    <video class="player__video viewer" src="video.mp4"></video>

    <div class="player__controls">
      <div class="progress">
        <div class="progress__filled"></div>
      </div>
      <button class="player__button toggle" title="Toggle Play">►</button>
      <span class="player__time">0:00 / 0:00</span>

      <label for="volume" class="player__label">Volume</label>
      <input type="range" id="volume" name="volume" class="player__slider" min="0" max="1" step="0.05" value="1">
      <span class="volume-display player__label">100%</span> 

      <label for="playbackRate" class="player__label">Speed</label>
      <input type="range" id="playbackRate" name="playbackRate" class="player__slider" min="0.5" max="2" step="0.1" value="1">
      <span class="speed-display player__label">1x</span>
      
      <button data-skip="-10" class="player__button">« 10s</button>
      <button data-skip="25" class="player__button">25s »</button>

      <button class="player__button fullscreen" title="Full Screen">[ ]</button>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>

</html>
