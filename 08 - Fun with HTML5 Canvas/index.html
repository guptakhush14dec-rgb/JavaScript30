<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HTML5 Canvas</title>
  <link rel="icon" href="https://fav.farm/✅" />
</head>

<body> 
  <canvas id="draw" width="800" height="800"></canvas>
  <div class="controls">
    <button id="clearBtn">Clear Canvas</button>
    <button id="eraserBtn">Eraser: OFF</button>
  </div>
  <script>
    const canvas = document.querySelector('#draw');
    const clearBtn = document.querySelector("#clearBtn");
    const eraserBtn = document.querySelector("#eraserBtn");
    //Creates a "Rendering Context" object, which contains all the methods for drawing shapes/lines in 2D.
    const ctx = canvas.getContext('2d');  

    canvas.width = window.innerWidth;  
    canvas.height = window.innerHeight;

    ctx.strokeStyle = '#BADA55';  
    ctx.lineJoin = 'round'; 
    ctx.lineCap = 'round'; 
    ctx.lineWidth = 100;
    // ctx.globalCompositeOperation = 'multiply';

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let hue = 0; 
    let direction = true; //for thickness of brush
    let isEraser = false;

    function draw(e) {
      if (!isDrawing) return;

      if (isEraser) { 
        ctx.globalCompositeOperation = 'destination-out'; //erasing 
      } else {
        ctx.globalCompositeOperation = 'source-over'; //drawing
        ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
      }


      console.log(e);
      // ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
      ctx.beginPath();
      ctx.moveTo(lastX, lastY); 
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke(); 
      [lastX, lastY] = [e.offsetX, e.offsetY];

      if (!isEraser) {
        hue++;
        if (hue >= 360) {
          hue = 0;
        }

        if (ctx.lineWidth >= 100 || ctx.lineWidth <= 1) {
          direction = !direction;
        }
        if (direction) {
          ctx.lineWidth++;
        } else {
          ctx.lineWidth--;
        }
      }
    }


    eraserBtn.addEventListener('click', () => {
      isEraser = !isEraser;
      eraserBtn.innerText = isEraser ? "Eraser: ON" : "Eraser: OFF";
      eraserBtn.classList.toggle('active');
    });

    clearBtn.addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);  
    });

    canvas.addEventListener('mousedown', (e) => {
      isDrawing = true;
      [lastX, lastY] = [e.offsetX, e.offsetY];
    });

    canvas.addEventListener('mouseenter', (e) => {
      if (e.buttons === 1) {  //checks if left mouse button is held down as the cursor re-enters the canvas
        isDrawing = true;
        [lastX, lastY] = [e.offsetX, e.offsetY];
      }
    });

    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseout', () => isDrawing = false);

  </script>

  <style>
    html,
    body {
      margin: 0;
      overflow: hidden;
    }


    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }


    button {
      padding: 10px 20px;
      font-size: 16px;
      background: white;
      border: 2px solid #333;
      border-radius: 5px;
      cursor: pointer;
      z-index: 10;
    }

    button:hover {
      background: #f0f0f0;
    }
  </style>

</body>

</html>
